<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WeChat Pay 培训 / トレーニング</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.6;font-size:15px}
.app{max-width:520px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.brand{padding:32px 24px 16px;text-align:center;background:linear-gradient(180deg,#07C160 0%,#06AD56 100%);color:#fff}
.brand .logo{font-size:13px;letter-spacing:1px;opacity:.85;margin-bottom:6px}
.brand h1{font-size:20px;font-weight:600;margin-bottom:4px}
.brand .sub{font-size:13px;opacity:.8}
.screen{flex:1;padding:24px;display:none}
.screen.active{display:block}
.card{background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:20px;margin-bottom:16px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:#6e6e73;margin-bottom:6px;font-weight:500}
.field label .ja{color:#1d1d1f}
.field label .cn{color:#86868b;font-size:12px;margin-left:4px}
.field input{width:100%;padding:12px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:16px;background:#fafafa;-webkit-appearance:none}
.field input:focus{outline:none;border-color:#07C160;background:#fff}
.btn{display:block;width:100%;padding:14px;background:#07C160;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:active{background:#06AD56}
.btn.ghost{background:#f2f2f7;color:#1d1d1f}
.btn.ghost:active{background:#e5e5ea}
.err{color:#ff3b30;font-size:13px;margin-top:8px;text-align:center;display:none}
.err.show{display:block}
.hint{font-size:12px;color:#86868b;text-align:center;margin-top:16px;line-height:1.5}
.topbar{padding:14px 20px;background:#fff;border-bottom:1px solid #e5e5ea;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.topbar .who{color:#1d1d1f;font-weight:500}
.topbar .who .who-sub{color:#86868b;font-size:12px;font-weight:400;margin-left:6px}
.topbar .progress{color:#07C160;font-weight:500}
.q-wrap{padding:24px 20px}
.q-num{font-size:12px;color:#07C160;font-weight:600;letter-spacing:1px;margin-bottom:8px}
.q-stem{font-size:17px;font-weight:600;color:#1d1d1f;margin-bottom:6px;line-height:1.5}
.q-stem-cn{font-size:13px;color:#86868b;margin-bottom:14px;line-height:1.5}
.stem-img{position:relative;border-radius:12px;overflow:hidden;background:#f5f5f7;margin-bottom:18px;border:1px solid #e5e5ea}
.stem-img img{width:100%;display:block;max-height:320px;object-fit:contain;background:#1d1d1f}
.stem-img-tag{position:absolute;top:10px;left:10px;background:#ff3b30;color:#fff;font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;letter-spacing:0.5px}
.options{display:grid;gap:12px}
.options.grid-2{grid-template-columns:1fr 1fr}
.opt{border:1.5px solid #e5e5ea;border-radius:12px;padding:14px;cursor:pointer;background:#fff;transition:all .15s;text-align:left;font-family:inherit;font-size:15px;color:#1d1d1f}
.opt:active{background:#f5f5f7}
.opt.selected{border-color:#07C160;background:#f0fbf5}
.opt.correct{border-color:#07C160;background:#e6f8ee}
.opt.wrong{border-color:#ff3b30;background:#fff1f0}
.opt.disabled{cursor:default;pointer-events:none}
.opt-img{width:100%;aspect-ratio:1;background:#f5f5f7;border-radius:8px;margin-bottom:8px;overflow:hidden;position:relative}
.opt-img svg{width:100%;height:100%;display:block}
.opt-label{font-weight:500;font-size:14px}
.opt-label-cn{font-size:12px;color:#86868b;margin-top:2px}
.opt-mark{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
.feedback{margin-top:16px;padding:16px;border-radius:12px;display:none}
.feedback.show{display:block}
.feedback.ok{background:#e6f8ee;border:1px solid #b8e8c9}
.feedback.ng{background:#fff1f0;border:1px solid #ffcccb}
.fb-title{font-size:14px;font-weight:600;margin-bottom:6px}
.fb-title.ok{color:#06AD56}
.fb-title.ng{color:#d70015}
.fb-body{font-size:13px;color:#3a3a3c;line-height:1.6}
.fb-body .why{margin-top:8px;padding-top:8px;border-top:1px dashed #d2d2d7}
.fb-body .why-label{font-weight:500;color:#1d1d1f;margin-right:4px}
.next-btn{margin-top:16px}
.result{padding:32px 24px;text-align:center}
.score-circle{width:140px;height:140px;border-radius:50%;background:#07C160;color:#fff;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-circle.low{background:#ff9500}
.score-num{font-size:42px;font-weight:700;line-height:1}
.score-suf{font-size:14px;opacity:.8;margin-top:4px}
.result-msg{font-size:18px;font-weight:600;margin-bottom:6px}
.result-sub{font-size:14px;color:#86868b;margin-bottom:24px}
.result-stat{display:flex;justify-content:center;gap:24px;margin-bottom:24px;font-size:13px;color:#6e6e73}
.result-stat span b{color:#1d1d1f;font-size:16px;display:block;margin-bottom:2px}
.review-title{font-size:14px;font-weight:600;color:#1d1d1f;text-align:left;margin:24px 0 12px;padding-top:20px;border-top:1px solid #e5e5ea}
.review-item{text-align:left;padding:14px;background:#fafafa;border-radius:10px;margin-bottom:10px;font-size:13px}
.review-item .rq{font-weight:500;color:#1d1d1f;margin-bottom:6px}
.review-item .ra{color:#86868b;line-height:1.6}
.review-item .ra .yc{color:#ff3b30}
.review-item .ra .right{color:#06AD56}
.share-tip{margin-top:20px;padding:14px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:13px;color:#92400e;line-height:1.6;text-align:left}
.footer{padding:20px;text-align:center;font-size:11px;color:#a1a1a6;border-top:1px solid #e5e5ea;background:#fafafa}
@media (min-width:520px){.app{margin-top:20px;margin-bottom:20px;border-radius:18px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06);min-height:auto}}
</style>
</head>
<body>
<div class="app">

<div class="brand" id="brand">
<div class="logo">WeChat Pay</div>
<h1>培训 / トレーニング</h1>
<div class="sub">加盟店物料铺设 · 物料配置研修</div>
</div>

<!-- Login Screen -->
<div class="screen active" id="screen-login">
<div style="padding:8px 0 16px">
<div class="card">
<div class="field">
<label><span class="ja">アカウント</span><span class="cn">服务商账号</span></label>
<input type="text" id="account" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="lian / wonder / spring ...">
</div>
<div class="field">
<label><span class="ja">パスワード</span><span class="cn">密码</span></label>
<input type="password" id="password" autocomplete="off" placeholder="wp-xxx-2026">
</div>
<div class="field">
<label><span class="ja">お名前</span><span class="cn">你的名字</span></label>
<input type="text" id="username" autocomplete="off" placeholder="田中太郎 / Tanaka">
</div>
<button class="btn" onclick="login()">開始 / 开始</button>
<div class="err" id="login-err">アカウントまたはパスワードが違います / 账号或密码错误</div>
</div>
<div class="hint">同一服务商共用一个账号 · 答题约 3 分钟<br>同じ加盟店パートナーは1つのアカウントを共有 · 約3分</div>
</div>
</div>

<!-- Quiz Screen -->
<div class="screen" id="screen-quiz">
<div class="topbar">
<div class="who"><span id="who-name">-</span><span class="who-sub" id="who-org">-</span></div>
<div class="progress"><span id="q-current">1</span>/<span id="q-total">10</span></div>
</div>
<div class="q-wrap" id="q-wrap"></div>
</div>

<!-- Result Screen -->
<div class="screen" id="screen-result">
<div class="result">
<div class="score-circle" id="score-circle">
<div class="score-num" id="score-num">0</div>
<div class="score-suf">/ 100</div>
</div>
<div class="result-msg" id="result-msg">お疲れ様でした！</div>
<div class="result-sub" id="result-sub">辛苦了 · 复习一下错题吧</div>
<div class="result-stat">
<span><b id="stat-correct">0</b>正解 / 答对</span>
<span><b id="stat-wrong">0</b>不正解 / 答错</span>
<span><b id="stat-time">0</b>分钟</span>
</div>
<div class="review-title">错题回顾 / 間違えた問題</div>
<div id="review-list"></div>
<div class="share-tip" id="share-tip">
📱 <b>请截图本页面发回给微信支付对接人</b><br>
スクリーンショットを WeChat 担当者に送ってください
</div>
<button class="btn ghost next-btn" onclick="restart()">もう一度 / 再来一次</button>
</div>
</div>

<div class="footer">© WeChat Pay · 仅供合作服务商内部培训使用</div>
</div>

// ============ SVG 占位图 (示意图，后期替换为真实门店照片) ============
// 货架 + 物料场景，用 OK / NG 标识
function svgScene(type) {
  // type: 'ok' | 'ng-block' | 'ng-corner' | 'ng-upside' | 'ng-covered'
  const colors = {
    bg: '#f5f5f7', shelf: '#d2d2d7', wall: '#e8e6e1',
    item: '#bcbab3', poster: '#07C160', posterBad: '#ff3b30',
    text: '#fff', stamp: '#fff'
  };
  const stamp = (label, color) => `
    <g transform="translate(140,16)">
      <circle r="14" fill="${color}" />
      <text y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" font-family="sans-serif">${label}</text>
    </g>`;
  const wall = `<rect width="160" height="160" fill="${colors.wall}"/>`;
  const shelf = `
    <rect x="10" y="100" width="140" height="6" fill="${colors.shelf}"/>
    <rect x="10" y="135" width="140" height="6" fill="${colors.shelf}"/>
    <rect x="20" y="60" width="22" height="40" fill="${colors.item}"/>
    <rect x="50" y="55" width="22" height="45" fill="${colors.item}"/>
    <rect x="80" y="65" width="22" height="35" fill="${colors.item}"/>
    <rect x="110" y="58" width="22" height="42" fill="${colors.item}"/>`;
  const poster = (x,y,w,h,rot,fill,qrShow) => `
    <g transform="translate(${x},${y}) rotate(${rot})">
      <rect width="${w}" height="${h}" fill="${fill}" rx="3"/>
      <text x="${w/2}" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="sans-serif">WeChat Pay</text>
      ${qrShow ? `<rect x="${w/2-12}" y="20" width="24" height="24" fill="#fff" rx="2"/>
      <rect x="${w/2-9}" y="23" width="6" height="6" fill="#000"/>
      <rect x="${w/2+3}" y="23" width="6" height="6" fill="#000"/>
      <rect x="${w/2-9}" y="35" width="6" height="6" fill="#000"/>` : ''}
    </g>`;
  let scene = '';
  if (type === 'ok') {
    scene = wall + shelf + poster(54, 14, 52, 50, 0, colors.poster, true) + stamp('OK', '#07C160');
  } else if (type === 'ng-corner') {
    scene = wall + shelf + poster(8, 8, 36, 32, 0, colors.poster, true) + stamp('NG', '#ff3b30');
  } else if (type === 'ng-upside') {
    scene = wall + shelf + poster(54, 14, 52, 50, 180, colors.poster, true) + stamp('NG', '#ff3b30');
  } else if (type === 'ng-covered') {
    scene = wall + shelf +
      poster(54, 14, 52, 50, 0, colors.poster, true) +
      `<rect x="40" y="30" width="80" height="40" fill="${colors.item}" opacity="0.85"/>` +
      stamp('NG', '#ff3b30');
  } else if (type === 'ng-blurry') {
    scene = wall + shelf + poster(54, 14, 52, 50, -8, colors.posterBad, false) + stamp('NG', '#ff3b30');
  } else if (type === 'reg-poster-correct') {
    // 收银台正确：贴在收银员侧面，朝向顾客
    scene = `<rect width="160" height="160" fill="#f0e6d2"/>
      <rect x="0" y="100" width="160" height="60" fill="#9c7c4f"/>
      <rect x="60" y="60" width="40" height="40" fill="#5b3e1d"/>` +
      poster(20, 70, 36, 34, 0, colors.poster, true) + stamp('OK', '#07C160');
  } else if (type === 'reg-poster-wrong') {
    scene = `<rect width="160" height="160" fill="#f0e6d2"/>
      <rect x="0" y="100" width="160" height="60" fill="#9c7c4f"/>
      <rect x="60" y="60" width="40" height="40" fill="#5b3e1d"/>` +
      poster(110, 130, 30, 24, 0, colors.poster, true) + stamp('NG', '#ff3b30');
  }
  return `<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">${scene}</svg>`;
}

let user = { account: '', org: '', name: '', startTs: 0 };
let currentIdx = 0;

// ============ Login ============
function login() {
  const acc = document.getElementById('account').value.trim().toLowerCase();
  const pw = document.getElementById('password').value.trim();
  const name = document.getElementById('username').value.trim();
  const errEl = document.getElementById('login-err');
  errEl.classList.remove('show');
  if (!acc || !pw) { errEl.textContent = 'アカウントとパスワードを入力してください / 请填写账号和密码'; errEl.classList.add('show'); return; }
  if (!name) { errEl.textContent = 'お名前を入力してください / 请填写你的名字'; errEl.classList.add('show'); return; }
  const rec = ACCOUNTS[acc];
  if (!rec || rec.pw !== pw) { errEl.classList.add('show'); errEl.textContent = 'アカウントまたはパスワードが違います / 账号或密码错误'; return; }
  user = { account: acc, org: rec.org, name: name, startTs: Date.now() };
  currentIdx = 0;
  answers = [];
  document.getElementById('who-name').textContent = name;
  document.getElementById('who-org').textContent = '· ' + rec.org;
  document.getElementById('q-total').textContent = QUESTIONS.length;
  showScreen('quiz');
  renderQuestion();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

// ============ Quiz ============
function renderQuestion() {
  const q = QUESTIONS[currentIdx];
  document.getElementById('q-current').textContent = currentIdx + 1;
  const wrap = document.getElementById('q-wrap');
  const isImage = q.type === 'image';
  const isImgQ = q.type === 'image-question';   // 题干上方一张大图，选项纯文字
  const gridClass = q.options.length === 2 ? 'grid-2' : (q.options.length === 4 && isImage ? 'grid-2' : '');

  let optionsHtml = '';
  q.options.forEach((opt, i) => {
    optionsHtml += `<button class="opt" data-idx="${i}" onclick="pickOption(${i})">`;
    if (isImage) {
      optionsHtml += `<div class="opt-img">${opt.img}<div class="opt-mark">${String.fromCharCode(65 + i)}</div></div>`;
    }
    optionsHtml += `<div class="opt-label">${opt.label_ja}</div>`;
    optionsHtml += `<div class="opt-label-cn">${opt.label_cn}</div>`;
    optionsHtml += `</button>`;
  });

  const multi = q.multi ? `<div style="font-size:12px;color:#86868b;margin-top:4px">複数選択可 / 可多选</div>` : '';

  // 题干上方大图（image-question 题型）
  const stemImg = isImgQ && q.image
    ? `<div class="stem-img"><img src="${q.image}" alt="案例图"><div class="stem-img-tag">REJECTED 却下</div></div>`
    : '';

  wrap.innerHTML = `
    <div class="q-num">QUESTION ${currentIdx + 1}</div>
    <div class="q-stem">${q.stem_ja}</div>
    <div class="q-stem-cn">${q.stem_cn}</div>
    ${stemImg}
    ${multi}
    <div class="options ${gridClass}">${optionsHtml}</div>
    <div class="feedback" id="feedback"></div>
    <button class="btn next-btn" id="submit-btn" onclick="submitAnswer()" style="display:${q.multi ? 'block' : 'none'}">確定 / 提交</button>
  `;
  pickedSet = new Set();
}

let pickedSet = new Set();
function pickOption(i) {
  const q = QUESTIONS[currentIdx];
  const optEls = document.querySelectorAll('.opt');
  if (q.multi) {
    if (pickedSet.has(i)) { pickedSet.delete(i); optEls[i].classList.remove('selected'); }
    else { pickedSet.add(i); optEls[i].classList.add('selected'); }
  } else {
    optEls.forEach(el => el.classList.remove('selected'));
    optEls[i].classList.add('selected');
    pickedSet = new Set([i]);
    submitAnswer();
  }
}

function submitAnswer() {
  const q = QUESTIONS[currentIdx];
  const picked = Array.from(pickedSet).sort((a,b)=>a-b);
  if (picked.length === 0) return;
  const correctArr = Array.isArray(q.answer) ? q.answer.slice().sort((a,b)=>a-b) : [q.answer];
  const isCorrect = picked.length === correctArr.length && picked.every((v,i)=>v===correctArr[i]);
  answers.push({ qid: q.id, picked, correct: isCorrect });

  const optEls = document.querySelectorAll('.opt');
  optEls.forEach((el, i) => {
    el.classList.add('disabled');
    if (correctArr.includes(i)) el.classList.add('correct');
    else if (picked.includes(i)) el.classList.add('wrong');
    el.classList.remove('selected');
  });

  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  fb.classList.add(isCorrect ? 'ok' : 'ng');
  const titleClass = isCorrect ? 'ok' : 'ng';
  const titleText = isCorrect ? '正解 / 答对了 ✓' : '不正解 / 答错了 ✗';
  let body = `<div class="fb-body">${q.explain_ja}<br><span style="color:#86868b">${q.explain_cn}</span>`;
  if (q.why_ja || q.why_cn) {
    body += `<div class="why"><span class="why-label">解析:</span>${q.why_ja || ''}${q.why_cn ? '<br><span style="color:#86868b">'+q.why_cn+'</span>' : ''}</div>`;
  }
  body += `</div>`;
  fb.innerHTML = `<div class="fb-title ${titleClass}">${titleText}</div>${body}`;

  const submitBtn = document.getElementById('submit-btn');
  if (submitBtn) {
    submitBtn.style.display = 'block';
    submitBtn.textContent = currentIdx === QUESTIONS.length - 1 ? '結果を見る / 查看结果' : '次へ / 下一题';
    submitBtn.onclick = nextQuestion;
  }
}

function nextQuestion() {
  if (currentIdx === QUESTIONS.length - 1) {
    finishQuiz();
  } else {
    currentIdx++;
    renderQuestion();
  }
}

// ============ Result ============
function finishQuiz() {
  const correctCount = answers.filter(a => a.correct).length;
  const wrongCount = answers.length - correctCount;
  const score = Math.round(correctCount / answers.length * 100);
  const minutes = Math.max(1, Math.round((Date.now() - user.startTs) / 60000));

  document.getElementById('score-num').textContent = score;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCount;
  document.getElementById('stat-time').textContent = minutes;

  const circle = document.getElementById('score-circle');
  if (score < 80) circle.classList.add('low'); else circle.classList.remove('low');

  const msg = document.getElementById('result-msg');
  const sub = document.getElementById('result-sub');
  if (score === 100)        { msg.textContent = '完璧！素晴らしい / 满分！'; sub.textContent = '所有知识点都掌握得非常好'; }
  else if (score >= 80)     { msg.textContent = '合格 / 通过'; sub.textContent = '基本知识点掌握 · 复习一下错题'; }
  else                      { msg.textContent = 'もう一度挑戦してください / 请再来一次'; sub.textContent = '建议先复习 SOP 后重新答题（80 分及格）'; }

  // 错题回顾
  const reviewWrap = document.getElementById('review-list');
  const wrongs = answers.filter(a => !a.correct);
  if (wrongs.length === 0) {
    reviewWrap.innerHTML = '<div style="text-align:center;color:#86868b;font-size:13px;padding:8px">全問正解 🎉 / 全部答对，太棒了</div>';
  } else {
    reviewWrap.innerHTML = wrongs.map(a => {
      const q = QUESTIONS.find(x => x.id === a.qid);
      const correctArr = Array.isArray(q.answer) ? q.answer : [q.answer];
      const correctLabels = correctArr.map(i => q.options[i].label_ja + (q.options[i].label_cn ? ' (' + q.options[i].label_cn + ')' : '')).join(' / ');
      const yourLabels = a.picked.map(i => q.options[i].label_ja).join(' / ');
      return `<div class="review-item">
        <div class="rq">Q${q.id}. ${q.stem_ja}<br><span style="color:#86868b;font-size:12px">${q.stem_cn}</span></div>
        <div class="ra"><span class="yc">你选: ${yourLabels}</span> · <span class="right">正解: ${correctLabels}</span><br>
        <span style="color:#1d1d1f;margin-top:6px;display:block">${q.explain_ja}</span>
        <span style="color:#86868b">${q.explain_cn}</span></div>
      </div>`;
    }).join('');
  }

  showScreen('result');
}

function restart() {
  document.getElementById('account').value = '';
  document.getElementById('password').value = '';
  document.getElementById('username').value = '';
  showScreen('login');
}

// ============ 防止意外刷新 ============
window.addEventListener('beforeunload', function(e) {
  if (currentIdx > 0 && currentIdx < QUESTIONS.length && answers.length < QUESTIONS.length) {
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>
